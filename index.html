<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Sklep Online</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: #f0f2f5; color: #333; }
        header { background: #1a1a1a; color: white; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 30px; }
        .product-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 220px; text-align: center; transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-5px); }
        .product-card h3 { margin: 15px 0 10px 0; font-size: 1.2rem; }
        .price { color: #28a745; font-weight: bold; font-size: 1.1rem; margin-bottom: 15px; }
        .btn-buy { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn-buy:hover { background: #0056b3; }
        
        #cart-section { background: white; max-width: 600px; margin: 30px auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        #cart-items { list-style: none; padding: 0; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .total { font-size: 1.3rem; text-align: right; margin-top: 20px; color: #1a1a1a; }
    </style>
</head>
<body>

<header>
    <h1>Mój Nowy Sklep</h1>
    <p>Przedmiotów w koszyku: <span id="cart-count">0</span></p>
</header>

<div id="produkty-lista" class="container">
    <!-- Tu JavaScript wstawi produkty z pliku JSON -->
</div>

<div id="cart-section">
    <h2>Twój Koszyk</h2>
    <ul id="cart-items"></ul>
    <div class="total">Suma: <strong id="total-price">0</strong> zł</div>
</div>

<script>
    let cart = [];
    let total = 0;

    // Pobieranie danych z pliku produkty.json
    fetch('produkty.json')
        .then(response => response.json())
        .then(data => {
            const lista = document.getElementById('produkty-lista');
            data.forEach(p => {
                lista.innerHTML += `
                    <div class="product-card">
                        <h3>${p.nazwa}</h3>
                        <p class="price">${p.cena} zł</p>
                        <button class="btn-buy" onclick="addToCart('${p.nazwa}', ${p.cena})">
                            Dodaj do koszyka
                        </button>
                    </div>
                `;
            });
        })
        .catch(err => console.error("Błąd wczytywania produktów:", err));

    function addToCart(name, price) {
        cart.push(name);
        total += price;

        // Aktualizacja licznika w nagłówku
        document.getElementById('cart-count').innerText = cart.length;

        // Dodanie elementu do listy koszyka
        const cartList = document.getElementById('cart-items');
        const item = document.createElement('li');
        item.className = 'cart-item';
        item.innerHTML = `<span>${name}</span> <span>${price} zł</span>`;
        cartList.appendChild(item);

        // Aktualizacja sumy
        document.getElementById('total-price').innerText = total;
    }
</script>

</body>
</html>
